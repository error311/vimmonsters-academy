name: Bug report
description: Report a gameplay, UI, save/load, or runtime issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact steps to reproduce it.
      placeholder: |
        1. Start a new run
        2. Go to Count Grove
        3. Open the drill
        4. Press ...
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area or lesson
      description: Which map, lesson, or system did this happen in?
      placeholder: Word Meadow / VimTree / battle / save-load
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
  - type: textarea
    id: console
    attributes:
      label: Browser console errors
      description: Paste any console error text if there was one.
      render: text
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and how you ran the game.
      placeholder: Firefox on Linux, npm run serve

